<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}
body{
    background:#0f0f10;
    color:#eaeaea;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:320px;
}
.card{
    text-align:center;
}
.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:15px;
    filter: grayscale(100%);
}
h2{
    font-size:20px;
    font-weight:600;
}
p{
    font-size:13px;
    color:#888;
    margin:8px 0 20px;
}
.link{
    display:block;
    text-decoration:none;
    color:#eaeaea;
    padding:12px;
    margin:8px 0;
    border:1px solid #2a2a2a;
    border-radius:10px;
    transition:0.25s;
}
.link:hover{
    background:#1a1a1a;
    border-color:#444;
}
.footer{
    margin-top:20px;
    font-size:11px;
    color:#555;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://i.imgur.com/2DhmtJ4.png" class="avatar">
        <h2>Tên của bạn</h2>
        <p>Nguyễn Trọng Trung</p>

        <a href="https://facebook.com/trongtrung450" class="link" target="_blank">Facebook</a>
        <a href="https://zalo.me/yourlink" class="link" target="_blank">Zalo</a>
        <a href="https://tiktok.com/@yourlink" class="link" target="_blank">TikTok</a>
        <a href="mailto:yourmail@gmail.com" class="link">Email</a>

        <div class="footer">© 2026</div>
    </div>
</div>

</body>
</html>
