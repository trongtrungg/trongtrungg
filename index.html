<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile cá nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    height:100vh;
    background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}
.container{
    width:350px;
    text-align:center;
}
.card{
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    transition:0.3s;
}
.card:hover{
    transform: translateY(-5px);
}
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00f7ff;
    box-shadow:0 0 20px #00f7ff;
}
h2{
    margin-top:15px;
    font-weight:600;
}
p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:20px;
}
.link{
    display:block;
    text-decoration:none;
    color:white;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    transition:0.3s;
}
.link:hover{
    transform: scale(1.05);
    box-shadow:0 0 15px #00c6ff;
}
.footer{
    margin-top:15px;
    font-size:12px;
    opacity:0.5;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://i.imgur.com/2DhmtJ4.png" class="avatar">
        <h2>Tên của bạn</h2>
        <p>Game thủ | Dev | Kiếm tiền online</p>

        <a href="https://facebook.com/yourlink" class="link" target="_blank">🌐 Facebook</a>
        <a href="https://zalo.me/yourlink" class="link" target="_blank">💬 Zalo</a>
        <a href="https://tiktok.com/@yourlink" class="link" target="_blank">🎵 TikTok</a>
        <a href="mailto:yourmail@gmail.com" class="link">📧 Email</a>

        <div class="footer">© 2026 - Profile</div>
    </div>
</div>

</body>
</html>
